version: "3.8"

services:
  # RAG DB (pgvector)
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "5436:5432"
    volumes:
      - rag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-user}", "-d", "${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  # Backend (published image)
  backend:
    image: dikshant04/careconnect-backend:latest
    container_name: dev-backend
    ports:
      - "3000:3000"
    env_file:
      - ../backend/.env
    networks:
      - dev-network

  # AI server (local build + hot reload)
  ai-server:
    build:
      context: .
    container_name: ai-dev
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached
      - /app/.venv
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
    networks:
      - dev-network

volumes:
  rag_pg_data:

networks:
  dev-network:
    driver: bridge